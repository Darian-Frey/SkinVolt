<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>SkinVolt</title>
    <link rel="stylesheet" href="styles.css" />

    <script>
        // Accessing the v2 core via the window object to avoid the import syntax error seen in console
        const { invoke } = window.__TAURI__.core;
        window.invoke = invoke;
        console.log("SkinVolt: Tauri IPC Bridge Active");
    </script>

    <script defer src="app.js"></script>
</head>

<body>
    <div id="app">

        <nav id="navbar">
            <div class="nav-title">SkinVolt</div>
            <ul class="nav-links">
                <li data-view="dashboard" class="active">Dashboard</li>
                <li data-view="inventory">Inventory</li>
                <li data-view="alerts">Alerts</li>
                <li data-view="settings">Settings</li>
            </ul>
        </nav>

        <main id="content">
            <section id="dashboard-view" class="view active">
                <h1>Dashboard</h1>
                <div class="placeholder">Charts will appear here in Phase 2</div>
            </section>

            <section id="inventory-view" class="view">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <h1>Inventory</h1>
                    <span class="tier-badge" id="tierDisplay">Tier: Basic</span>
                </div>

                <div class="inventory-controls" style="margin-bottom: 20px; display: flex; gap: 10px;">
                    <input type="text" id="itemNameInput" placeholder="Item Name (e.g. AK-47 | Slate)"
                        style="flex-grow: 1;">
                    <input type="number" id="itemQtyInput" value="1" min="1" style="width: 60px;">
                    <button id="addItemBtn">Add Item</button>
                </div>

                <table id="inventoryTable" style="width: 100%; border-collapse: collapse;">
                    <thead>
                        <tr style="text-align: left; border-bottom: 2px solid var(--accent);">
                            <th style="padding: 10px;">Skin Name</th>
                            <th style="padding: 10px;">Qty</th>
                            <th style="padding: 10px;">Market Price</th>
                            <th style="padding: 10px;">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="inventoryBody">
                    </tbody>
                </table>
            </section>

            <section id="alerts-view" class="view">
                <h1>Alerts</h1>
                <div class="placeholder">Price alerts will appear here</div>
            </section>

            <section id="settings-view" class="view">
                <h1>Settings</h1>

                <div class="settings-group">
                    <label>Refresh Interval (seconds)</label>
                    <input id="refreshInterval" type="number" min="10" value="60" />
                </div>

                <div class="settings-group">
                    <label>Currency</label>
                    <select id="currencySelect">
                        <option value="USD">USD</option>
                        <option value="EUR">EUR</option>
                        <option value="GBP">GBP</option>
                    </select>
                </div>

                <div class="settings-group">
                    <label>Dark Mode</label>
                    <input id="darkModeToggle" type="checkbox" />
                </div>

                <button id="saveSettings">Save Settings</button>
                <div class="dev-panel" style="margin-top: 40px; border-top: 2px dashed #ff4a4a; padding-top: 20px;">
                    <h3 style="color: #ff4a4a;">🛠️ Developer Mode: Tier Testing</h3>
                    <div style="display: flex; gap: 10px;">
                        <button onclick="testTier('free')">Set FREE</button>
                        <button onclick="testTier('basic')">Set BASIC</button>
                        <button onclick="testTier('pro')">Set PRO</button>
                        <button onclick="testTier('elite')">Set ELITE</button>
                    </div>
                </div>
            </section>
        </main>
    </div>
</body>

</html>
